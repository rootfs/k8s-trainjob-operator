apiVersion: v1
kind: Namespace
metadata:
  name: trainjob-agents
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: trainjob-agent
  namespace: trainjob-agents
---
# Agents only need access to create Jobs (their own runs) and read
# ConfigMaps. They don't need access to the trainjob-operator's
# resources — all changes go through git, not the K8s API.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: trainjob-agent
  namespace: trainjob-agents
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: trainjob-agent
  namespace: trainjob-agents
subjects:
  - kind: ServiceAccount
    name: trainjob-agent
    namespace: trainjob-agents
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: trainjob-agent
