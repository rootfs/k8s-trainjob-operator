apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-serving
  namespace: trainjob-agents
  labels:
    app: vllm-serving
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-serving
  template:
    metadata:
      labels:
        app: vllm-serving
    spec:
      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          args:
            - serve
            - "Qwen/Qwen2.5-Coder-32B-Instruct"
            - "--enable-auto-tool-choice"
            - "--tool-call-parser=hermes"
            - "--max-model-len=32768"
            - "--tensor-parallel-size=4"
            - "--host=0.0.0.0"
            - "--port=8000"
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          resources:
            requests:
              cpu: "8"
              memory: "64Gi"
              nvidia.com/gpu: "4"
            limits:
              nvidia.com/gpu: "4"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 180
            periodSeconds: 30
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
                  optional: true
          volumeMounts:
            - name: model-cache
              mountPath: /root/.cache/huggingface
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: vllm-model-cache
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
---
apiVersion: v1
kind: Service
metadata:
  name: vllm
  namespace: trainjob-agents
spec:
  selector:
    app: vllm-serving
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
